<!DOCTYPE html>

<html lang="fa">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Reza Cyber Lab</title>

    <style>
        body {
            background: black;
            color: #00ff00;
            font-family: Courier New;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        h1 {
            font-size: 50px;
            text-shadow: 0 0 10px #00ff00;
            margin-top: 30px;
        }

        .container {
            width: 80%;
            margin: auto;
        }

        .box {
            border: 1px solid #00ff00;
            padding: 20px;
            margin: 30px;
            border-radius: 10px;
            box-shadow: 0 0 15px #00ff00;
        }

        video {
            width: 400px;
            margin: 20px;
            border: 2px solid #00ff00;
            border-radius: 10px;
        }

        img {
            width: 300px;
            margin: 20px;
            border: 2px solid #00ff00;
            border-radius: 10px;
        }

        p {
            font-size: 20px;
        }
    </style>

</head>

<body>

    <h1>⚡ REZA CYBER LAB ⚡</h1>

    <div class="container">

        <div class="box">

            <h2>درباره من</h2>

            <p>
                😎 این سایت توسط رضا ساخته شده
                <br>
                Powered By Python + Flask
            </p>

        </div>

        <div class="box">

            <h2>🎬 ویدیو ها</h2>

            <video controls>
                <source src="/static/video1.mp4" type="video/mp4">
            </video>

            <video controls>
                <source src="/static/video2.mp4" type="video/mp4">
            </video>

            <video controls>
                <source src="/static/video3.mp4" type="video/mp4">
            </video>

        </div>

        <div class="box">

            <h2>🖼 تصاویر</h2>

            <img src="/static/photo1.jpg" alt="photo1">

            <img src="/static/photo2.jpg" alt="photo2">

        </div>

    </div>

</body>

</html>
