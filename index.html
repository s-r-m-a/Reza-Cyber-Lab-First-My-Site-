<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reza Cyber Lab</title>

    <style>
        body {
            background: black;
            color: #00ff00;
            font-family: Courier New, monospace;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        h1 {
            font-size: 50px;
            text-shadow: 0 0 10px #00ff00;
            margin-top: 30px;
        }

        h2 {
            text-shadow: 0 0 8px #00ff00;
        }

        .container {
            width: 80%;
            margin: auto;
        }

        .box {
            border: 1px solid #00ff00;
            padding: 20px;
            margin: 30px;
            border-radius: 10px;
            box-shadow: 0 0 15px #00ff00;
        }

        video {
            width: 400px;
            max-width: 90%;
            margin: 20px;
            border: 2px solid #00ff00;
            border-radius: 10px;
            background: #111;
        }

        img {
            width: 300px;
            max-width: 90%;
            margin: 20px;
            border: 2px solid #00ff00;
            border-radius: 10px;
        }

        p {
            font-size: 20px;
            line-height: 1.8;
        }
    </style>
</head>
<body>

                <br>
                Powered By GitHub Pages

        </div>

        <div class="box">

            <video controls>

</html>
